name: build

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v3
      - name: Build release
        run: cargo build --release
      - name: Clippy
        run: cargo clippy --release -- -D warnings

