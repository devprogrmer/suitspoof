name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Show toolchain
        run: |
          rustc -V
          cargo -V

      - name: Build (release)
        run: |
          set -euxo pipefail
          cargo build --release
          BIN_PATH="$(find target/release -maxdepth 1 -type f -executable ! -name '*.d' ! -name 'build-script-*' | head -n1)"
          test -n "$BIN_PATH"
          cp "$BIN_PATH" suit-linux-amd64
          chmod +x suit-linux-amd64
          ls -lh suit-linux-amd64

      - name: Create GitHub Release + upload asset
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: suit-linux-amd64
