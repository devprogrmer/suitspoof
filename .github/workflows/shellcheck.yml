name: ShellCheck

on:
  push:
    paths:
      - "suit-manager.sh"
      - ".github/workflows/shellcheck.yml"
  pull_request:
    paths:
      - "suit-manager.sh"
      - ".github/workflows/shellcheck.yml"

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: .
          ignore_paths: .git
