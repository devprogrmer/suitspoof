role = "client"

# Real endpoint identities
real_ip = "YOUR_CLIENT_REAL_IP"
peer_real_ip = "YOUR_SERVER_REAL_IP"

# Spoof / cover identities
spoofed_ip = "198.51.100.10"
peer_spoofed_ip = "203.0.113.10"
spoofed_ip_pool = ["198.51.100.10", "198.51.100.11", "198.51.100.12"]

# Transport
uplink_protocol = "udp"
downlink_protocol = "udp"
data_port = 443
shuffle_data_port = true
data_port_min = 20000
data_port_max = 40000

# Security
pre_shared_key = "CHANGE_ME_TO_A_LONG_RANDOM_KEY"

# TUN
interface = "suit0"
tun_ip = "10.88.0.1/30"
tun_peer_ip = "10.88.0.2"

# Performance
tunnel_count = 1
mtu = 1380
enable_multiplex = true
multiplex_max_streams = 32
enable_fec = false
fec_group_size = 8

# Obfuscation / shaping
packet_padding = true
ttl_jitter = true
random_dscp = true
fake_tls_header = false
